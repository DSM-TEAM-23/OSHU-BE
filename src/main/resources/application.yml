server:
  # Reverse proxies (for example, Nginx or a load balancer) pass the public
  # scheme and host in X-Forwarded-* headers.  Use those values when building
  # the OAuth callback URL.
  forward-headers-strategy: framework

spring:
  application:
    name: "OSHU API"
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "${GOOGLE_WEB_CLIENT_ID:replace-with-google-client-id.apps.googleusercontent.com}"
            client-secret: "${GOOGLE_WEB_CLIENT_SECRET:replace-with-google-client-secret}"
            scope:
              - openid
              - profile
              - email
            # If GOOGLE_REDIRECT_URI is not set, create the callback from the
            # public URL of the incoming request instead of localhost.
            redirect-uri: "${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}"
  datasource:
    url: "${DB_URL:jdbc:h2:mem:oshu;MODE=MySQL;DB_CLOSE_DELAY=-1}"
    username: "${DB_USERNAME:sa}"
    password: "${DB_PASSWORD:}"
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

oshu:
  public-data:
    base-url: "https://apis.data.go.kr/B553077/api/open/sdsc2"
    service-key: "${PUBLIC_DATA_SERVICE_KEY:}"
  jwt:
    secret: "${OSHU_JWT_SECRET:oshu-dev-jwt-secret-key-that-should-be-overridden}"
    access-token-expiration-seconds: "${OSHU_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:43200}"
  google:
    mobile-callback-uri: "${OSHU_MOBILE_CALLBACK_URI:oshu://auth/callback}"
  anthropic:
    api-key: "${ANTHROPIC_API_KEY:}"
    model: "${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}"
    base-url: "${ANTHROPIC_BASE_URL:https://api.anthropic.com/v1}"
  storage:
    region: "${AWS_REGION:us-east-1}"
    bucket: "${S3_BUCKET:oshu-media-zo23-452529558267}"
