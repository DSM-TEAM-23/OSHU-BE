spring.application.name=OSHU API
spring.datasource.url=jdbc:h2:mem:oshu;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
oshu.public-data.base-url=https://apis.data.go.kr/B553077/api/open/sdsc2
oshu.public-data.service-key=${PUBLIC_DATA_SERVICE_KEY:}
oshu.owner-token=${OSHU_OWNER_TOKEN:oshu-owner-dev-token}
